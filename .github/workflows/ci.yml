name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=models --cov=scripts --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: |
          ruff check models/ scripts/ tests/

      - name: Run mypy
        run: |
          mypy models/ scripts/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for weights_only=False
        run: |
          # Fail if any script uses torch.load without weights_only=True
          if grep -r "torch.load.*weights_only=False" --include="*.py" scripts/ models/ tools/; then
            echo "ERROR: Found torch.load with weights_only=False"
            exit 1
          fi
          if grep -r "torch.load([^)]*map_location" --include="*.py" scripts/ models/ tools/ | grep -v "weights_only=True"; then
            echo "ERROR: Found torch.load without weights_only=True"
            exit 1
          fi
          echo "Security check passed"