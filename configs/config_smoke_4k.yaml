# 冒烟训练配置：4000 行小训练，单 epoch，不做防过拟合
# 目的：快速验证训练流程 + 对比多种生成方式（IGMCG 开/关、速度）
model:
  vocab_size: 12000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 64
  dropout: 0                      # 关闭 dropout（不做正则）
  tie_weights: true
  gradient_checkpointing: true
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  layer_plan: null
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  attn_window: 0
  attn_rel_bias: false

training:
  batch_size: 32
  epochs: 1                      # 只训练一轮
  learning_rate: 3.0e-3          # 小数据单轮，适度偏大以看到损失下降
  weight_decay: 0.0              # 关闭 L2 正则
  gradient_clip: 1.0             # 仅防梯度爆炸，非过拟合防护
  warmup_steps: 0
  early_stop_patience: 9999      # 禁用早停（确保跑满 1 epoch）
  label_smoothing: 0.0           # 关闭标签平滑
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"        # 恒定学习率，单轮无需衰减
  compile: false

data:
  train_file: "data/pretrain_corpus/merged_sample.txt"   # 4000 行
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_smoke_4k"
  log_dir: "logs_smoke_4k"

device: "auto"
seed: 42

