# 第十五轮新特性冒烟训练 B：Gated DeltaNet（delta rule + α/β 门控）
# 用纯 gated_delta mixer 验证 GatedDeltaNet 训练/推理一致性
model:
  vocab_size: 12000
  embedding_dim: 256
  num_heads: 8
  num_layers: 4
  hidden_dim: 512
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  layer_plan: "attn,attn,attn,attn"
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  attn_window: 0
  attn_rel_bias: false
  alibi: false
  # 第十五轮新特性
  mixer: "gated_delta"
  rope_dim_fraction: 0.5         # Partial RoPE（GatedDeltaNet 也支持）
  zero_centered_norm: true       # Zero-Centered RMSNorm
  delta_alpha_init: -2.0
  delta_beta_init: 2.0

training:
  batch_size: 16
  epochs: 1
  learning_rate: 3.0e-3
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 0
  early_stop_patience: 9999
  label_smoothing: 0.0
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"
  compile: false

data:
  train_file: "data/pretrain_corpus/merged_sample.txt"
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_smoke_gated_delta"
  log_dir: "logs_smoke_gated_delta"

device: "auto"
seed: 42
