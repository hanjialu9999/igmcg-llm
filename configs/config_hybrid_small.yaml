# 混合架构（小参数版，CPU 训练）—— 为后续训练做准备，当前未启动
# 关键：epochs>1 时 train.py 每个 epoch 末保存 model_epoch_*.pt，
# 即使中途中断也不会像之前(epochs=1)那样全部丢失。
# 注意：DML 训练 SSM 会触发 iGPU 重置(GetDeviceRemovedReason)，故 device 固定 cpu。
model:
  vocab_size: 12000
  embedding_dim: 256
  num_heads: 8
  num_layers: 4
  hidden_dim: 512
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: true
  layer_plan: "attn,ssm,attn,ssm"
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  attn_window: 0
  attn_rel_bias: false

training:
  batch_size: 64
  epochs: 3
  learning_rate: 1.0e-3
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.1
  early_stop_patience: 5
  label_smoothing: 0.0  # 已废弃：train.py 会强制置 0 并警告
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "wsd"
  wsd_decay_frac: 0.1
  compile: false

data:
  train_file: "data/pretrain_corpus/merged.txt"
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_hybrid_small"
  log_dir: "logs_hybrid_small"

device: "cpu"

seed: 42


