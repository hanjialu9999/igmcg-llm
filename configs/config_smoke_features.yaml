# 冒烟训练配置（全架构特性）：验证 M3(DifferentialAttention+memory) + M1(ngram_fusion 温度路径)
# 小模型 + 4000 行 + 1 epoch + DML，快速验证修复路径不崩溃且能训练
model:
  vocab_size: 8000
  embedding_dim: 128
  num_heads: 4
  num_layers: 2
  hidden_dim: 256
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false   # 小模型关掉重算省时间
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  # —— 架构特性全开 ——
  mixer: diff                      # M3 验证：DifferentialAttention
  layer_plan: null
  # SSM 配置（mixer=diff 时不走 SSM，但保留字段一致性）
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  # 注意力增强
  attn_window: 0
  attn_rel_bias: false             # 关：DML 上相对位置偏置计算重
  qk_norm: true                    # QK 归一化（轻量）
  attn_temp: true                  # 注意力温度（轻量）
  rope_learnable: false
  alibi: false                     # 关：alibi+memory 组合在 DML 上较重
  # 记忆系统（M3 验证核心：diff + memory 不崩）
  memory_size: 16
  memory_comp_dim: 16
  memory_retrieval: true           # 启用检索
  memory_retrieval_topk: 8
  memory_retrieval_full: false
  memory_forget: false
  memory_product_key: false
  # 跳层 / 可学窗口 / 门控（关：非核心验证目标，减负）
  layer_skip: false
  learn_window: false
  residual_gate: true
  hybrid_gate: true
  hybrid_single_gate: false
  # 字符合并（关：非核心验证目标，减负）
  char_merge: false
  char_merge_kernel: 3
  char_merge_dropout: 0.0
  # n-gram 融合（M1 验证核心：温度路径在后续步不丢失）
  ngram_fusion: true
  ngram_gate_scale: 1.0
  ngram_corpus: "data/pretrain_corpus/smoke_4000.txt"   # 显式指定小语料，避免扫 575MB 大文件
  ngram_max_order: 3                                     # 降阶省内存（AGENTS §8 结论）
  ngram_min_count: 2
  igmcg: false                     # IGMCG 批量路径另测

training:
  batch_size: 32
  epochs: 1
  learning_rate: 3.0e-3
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 0
  early_stop_patience: 9999
  label_smoothing: 0.0
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"
  compile: false

data:
  train_file: "data/pretrain_corpus/merged_sample.txt"
  vocab_size: 8000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_smoke_features"
  log_dir: "logs_smoke_features"

device: "auto"
seed: 42
