# 正式预训练配置（DML / AMD 核显版）：应用 Plan B 手动注意力，规避 DML fused SDPA 崩溃
# 与 configs/pretrain.yaml 完全一致，仅改设备探测 + 独立输出目录，避免覆盖 CPU 训练产物
model:
  vocab_size: 8000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 256
  dropout: 0
  tie_weights: true
  gradient_checkpointing: true   # 重算力部分(attend)反向重算，降低 iGPU 共享显存峰值，规避 DML device reset

training:
  batch_size: 64
  epochs: 1
  learning_rate: 5.0e-4       # 数据量增大(600MB vs 97MB)，下调 LR 保稳定
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.1
  early_stop_patience: 5
  label_smoothing: 0.1
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "wsd"
  wsd_decay_frac: 0.1
  compile: false
  show_progress: false       # 关闭 tqdm，按 10 batch 打印 Speed（配合 python -u 实时观察）
  # ---- 默认训练采用 SEL v2 选择性增强调度（2026-07-14 起，与 pretrain.yaml 一致）----
  # 8 段：1 全开 + 1 全关极端 + 6 局部（attn_temp 仅全关段关，平时恒开）。
  enhancement_schedule:
    - { qk_norm: true,  attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: false, attn_temp: false, residual_gate: false, hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }

data:
  train_file: "data/pretrain_corpus/merged.txt"
  vocab_size: 8000
  max_seq_length: 256
  num_workers: 0
  prefetch: 2
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_dml"
  log_dir: "logs_dml"

device: "auto"

seed: 42
