# 50MB 同规模 DML 训练配置：架构与 config_char_dml.yaml 一致
# （char_merge + 滑动窗口 + 阶段2/3 记忆检索），数据 50MB。
# DML(核显共享显存)下 hidden_dim=768/seq=128/window=64/batch=24，以适配显存限制。
# 数据量(50MB)与模型规模不变，"同规模"等价于同数据/同架构、仅 micro-batch 更小、step 更多。
model:
  vocab_size: 5000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 768
  max_seq_length: 128
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false
  attn_window: 64
  rope_base: 10000.0
  rope_max_len: 4096
  char_merge: true
  char_merge_kernel: 3
  char_merge_dropout: 0.0
  memory_size: 64
  memory_comp_dim: 32
  memory_retrieval: true
  memory_sparse_topk: 32

training:
  batch_size: 24
  epochs: 1
  optimizer: "sgd"
  learning_rate: 5.0e-4
  sgd_learning_rate: 0.1
  momentum: 0.9
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.1
  early_stop_patience: 5
  label_smoothing: 0.0  # 已废弃：train.py 会强制置 0 并警告
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "wsd"
  wsd_decay_frac: 0.1
  compile: false
  show_progress: true
  enhancement_schedule:
    - { qk_norm: true,  attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: false, attn_temp: false, residual_gate: false, hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }

data:
  train_file: "data/pretrain_corpus/merged_50mb.txt"
  vocab_size: 5000
  max_seq_length: 128
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_50mb_dml"
  log_dir: "logs_50mb_dml"

device: "auto"

seed: 42


