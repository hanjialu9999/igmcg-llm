# 第二十一轮新特性冒烟训练：RWKV-7 广义 Delta Rule
# 在 GatedDeltaNet 基础上启用 rwkv7（rank-1 状态扰动项）
model:
  vocab_size: 12000
  embedding_dim: 256
  num_heads: 8
  num_layers: 4
  hidden_dim: 512
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  layer_plan: "attn,attn,attn,attn"
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  attn_window: 0
  attn_rel_bias: false
  alibi: false
  mixer: "gated_delta"
  rope_dim_fraction: 0.5
  zero_centered_norm: true
  delta_alpha_init: -2.0
  delta_beta_init: 2.0
  # 第二十一轮新特性
  rwkv7: true                   # RWKV-7 rank-1 状态扰动

training:
  batch_size: 16
  epochs: 1
  learning_rate: 3.0e-3
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 0
  early_stop_patience: 9999
  label_smoothing: 0.0
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"
  compile: false

data:
  train_file: "data/pretrain_corpus/merged_sample.txt"
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_smoke_rwkv7"
  log_dir: "logs_smoke_rwkv7"

device: "auto"
seed: 42
