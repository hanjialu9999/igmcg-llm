# 探流程用小型配置：8000 行数据 + 小模型，验证 SELv2 训练流程是否跑通
# 架构与 config_char_dml.yaml 一致（char_merge + 滑动窗口 + 阶段2/3 记忆检索），
# 但模型显著缩小、序列缩短、单 epoch，仅用于跑通流程。
model:
  vocab_size: 5000
  embedding_dim: 128
  num_heads: 4
  num_layers: 2
  hidden_dim: 256
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: true
  attn_window: 32
  rope_base: 10000.0
  rope_max_len: 4096
  char_merge: true
  char_merge_kernel: 3
  char_merge_dropout: 0.0
  # 阶段2 可学习压缩记忆（小模型用更小槽数，避免参数量过大）
  memory_size: 32
  memory_comp_dim: 16
  # 阶段3 可学习检索/稀疏
  memory_retrieval: true
  memory_sparse_topk: 16

training:
  batch_size: 16
  epochs: 1
  learning_rate: 5.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.1
  early_stop_patience: 5
  label_smoothing: 0.1
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "wsd"
  wsd_decay_frac: 0.1
  compile: false
  show_progress: true
  # SELv2 分段增强：按 batch 循环切换各增强开关
  enhancement_schedule:
    - { qk_norm: true,  attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: false, attn_temp: false, residual_gate: false, hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true,  residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true,  residual_gate: true,  hybrid_gate: false }

data:
  train_file: "data/pretrain_corpus/merged_8k_smoke.txt"
  vocab_size: 5000
  max_seq_length: 64
  num_workers: 0
  prefetch: 2
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_smoke"
  log_dir: "logs_smoke"

device: "auto"

seed: 42
