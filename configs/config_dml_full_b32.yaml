# 正式预训练配置（DML / AMD 核显版）：应用 Plan B 手动注意力，规避 DML fused SDPA 崩溃
# 与 configs/pretrain.yaml 完全一致，仅改设备探测 + 独立输出目录，避免覆盖 CPU 训练产物
model:
  vocab_size: 12000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false

training:
  batch_size: 32
  epochs: 1
  learning_rate: 1.0e-3
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.1
  early_stop_patience: 5
  label_smoothing: 0.1
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "wsd"
  wsd_decay_frac: 0.1
  compile: false

data:
  train_file: "data/pretrain_corpus/merged.txt"
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  prefetch: 2
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_dml_b32"
  log_dir: "logs_dml_b32"

device: "auto"

seed: 42
