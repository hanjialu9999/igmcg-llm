# 对比实验：交替增强（增强参数已构建，训练时按批次随机跳过增强，enahncement_off_prob=关闭概率）
# 与 enh 仅 training.enhancement_off_prob 不同；其余（含增强开关）完全一致。
model:
  vocab_size: 12000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: true
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  layer_plan: null
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  attn_window: 0
  attn_rel_bias: false
  # 增强全部开启（参数存在；训练时按批次随机跳过，关闭时恒等）
  qk_norm: true
  attn_temp: true
  residual_gate: true
  hybrid_gate: true

training:
  batch_size: 32
  epochs: 1
  learning_rate: 3.0e-3
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 0
  early_stop_patience: 9999
  label_smoothing: 0.0
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"
  compile: false
  show_progress: false
  # 交替增强：每个批次以 0.5 概率跳过增强（QK-Norm/温度/门控恒等），平均省约一半增强开销
  enhancement_off_prob: 0.5

data:
  train_file: "data/pretrain_corpus/merged_sample_8k_top.txt"   # 前 8000 行（自上而下），与 base/enh 同文件
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  prefetch: 2
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_cmp_alt"
  log_dir: "logs_cmp_alt"

device: "auto"
seed: 42

generation:
  temperature: 0.8
  top_k: 50
  repetition_penalty: 1.2
  min_length: 3
  eos_penalty: -5.0
