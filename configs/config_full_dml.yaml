model:
  # 本配置 = DML 扫描最优「质量档」（4.28M params / 91.6k tok/s / val 6.20）。
  # 容量档（~20M）备选：embedding_dim: 640 / num_layers: 6 / num_heads: 4 /
  #   memory_size: 0（关记忆！大模型在小数据下 memory 过拟合，关掉质量暴涨 13.6→8.7）/
  #   linear_attn_head_dim: 16 / attn_window: 64 → 20.3M / ~21k tok/s / val ~8.7。
  vocab_size: 5000
  embedding_dim: 256
  num_heads: 4
  num_layers: 4
  hidden_dim: 512
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false
  attn_window: 32
  rope_max_len: 4096
  char_merge: true
  char_merge_kernel: 3
  char_merge_dropout: 0.0
  memory_size: 32
  memory_comp_dim: 16
  memory_retrieval: true
  memory_sparse_topk: 16
  memory_retrieval_full: false
  memory_forget: true
  ngram_fusion: true
  mixer: hybrid
  linear_attn_feature: relu
  linear_attn_head_dim: 16
  learn_window: true
  layer_skip: false
  # DML 扫描（2026-07-18）确认有益的开关：
  alibi: true                       # 位置偏置，单 epoch val 略降（6.51→6.18）
  complexity_reward: true           # 复杂度预算正则，val 略降（6.09→5.87）；需配 complexity_lambda
  rope_learnable: true              # 可学 RoPE 频率（bug 已修复 2026-07-18：cos/sin 缓存隔离 autograd 图）
training:
  complexity_lambda: 0.05           # 复杂度奖励系数（hinge 预算约束）
  batch_size: 8
  # DML 扫描（2026-07-18）：epochs 是质量第一杠杆（ep1 val8.0 → ep3 val5.2 → ep3+lr0.3 val2.8）；lr 偏高更优
  epochs: 3
  optimizer: sgd
  learning_rate: 0.3
  sgd_learning_rate: 0.3
  momentum: 0.9
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.0
  lr_schedule: wsd
  wsd_decay_frac: 0.1
  early_stop_patience: 3
  precision: fp32
  grad_accum_steps: 1
  compile: false
  show_progress: true
  enhancement_schedule:
  - qk_norm: true
    attn_temp: true
    residual_gate: true
    hybrid_gate: true
  - qk_norm: false
    attn_temp: false
    residual_gate: false
    hybrid_gate: false
  - qk_norm: true
    attn_temp: true
    residual_gate: false
    hybrid_gate: false
  - qk_norm: false
    attn_temp: true
    residual_gate: true
    hybrid_gate: false
  - qk_norm: true
    attn_temp: true
    residual_gate: false
    hybrid_gate: true
  - qk_norm: false
    attn_temp: true
    residual_gate: true
    hybrid_gate: false
  - qk_norm: true
    attn_temp: true
    residual_gate: false
    hybrid_gate: false
  - qk_norm: false
    attn_temp: false
    residual_gate: false
    hybrid_gate: false
data:
  train_file: data/pretrain_corpus/merged_sample.txt
  vocab_size: 5000
  max_seq_length: 64
  num_workers: 0
  test_split: 0.1
paths:
  checkpoint_dir: checkpoints_full_dml
  log_dir: logs_full_dml
device: auto
seed: 42
