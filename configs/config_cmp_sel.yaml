# 对比实验：分段「选择性」交替增强（与 enh 仅训练期增强调度不同，其余完全一致）
# 思路：attn_temp 开销可忽略且恒有益 -> 始终开；qk_norm/residual_gate/hybrid_gate 有非忽略开销 ->
# 按 batch 在 4 个分段掩码间循环切换（多分段、非整体 50% 关闭），模型始终至少保留 attn_temp，
# 不会经历“全关”状态，既给模型多样性又尽量保留增强收益。推理时同 enh 全开。
model:
  vocab_size: 12000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 64
  dropout: 0
  tie_weights: true
  gradient_checkpointing: true
  rope_base: 10000.0
  rope_max_len: 4096
  mask_fill_value: -1e9
  layer_plan: null
  ssm_d_state: 16
  ssm_d_inner_factor: 1
  ssm_dt_rank: null
  ssm_conv_kernel: 3
  ssm_dt_proj_bias_init: 0.1
  ssm_a_log_init_range: [-1, 1]
  ssm_D_init: 1.0
  attn_window: 0
  attn_rel_bias: false
  qk_norm: true
  attn_temp: true
  residual_gate: true
  hybrid_gate: true

training:
  batch_size: 32
  epochs: 1
  learning_rate: 3.0e-3
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 0
  early_stop_patience: 9999
  label_smoothing: 0.0
  cpu_threads: 4
  precision: "fp32"
  grad_accum_steps: 1
  eta_min: 0.0
  lr_schedule: "constant"
  compile: false
  show_progress: false
  # 分段选择性交替：按 batch 循环取以下掩码（缺省键补 True=开）。attn_temp 始终开；
  # 4 段分别：仅 attn_temp / +qk_norm / +residual_gate / 全开（hybrid 纯 attn 惰性）。
  enhancement_schedule:
    - { qk_norm: false, attn_temp: true, residual_gate: false, hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true, residual_gate: false, hybrid_gate: false }
    - { qk_norm: false, attn_temp: true, residual_gate: true,  hybrid_gate: false }
    - { qk_norm: true,  attn_temp: true, residual_gate: true,  hybrid_gate: false }

data:
  train_file: "data/pretrain_corpus/merged_sample_8k_top.txt"   # 前 8000 行（自上而下），与 base/enh/alt 同文件
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  prefetch: 2
  test_split: 0.1

paths:
  checkpoint_dir: "checkpoints_cmp_sel"
  log_dir: "logs_cmp_sel"

device: "auto"
seed: 42

generation:
  temperature: 0.8
  top_k: 50
  repetition_penalty: 1.2
  min_length: 3
  eos_penalty: -5.0
