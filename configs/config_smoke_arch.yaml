model:
  # 训练冒烟配置：验证最新架构（统一分词+模块化后）端到端跑通。尽量开启架构特性。
  vocab_size: 5000
  embedding_dim: 96
  num_heads: 4
  num_layers: 2
  hidden_dim: 192
  max_seq_length: 32
  dropout: 0
  tie_weights: true
  gradient_checkpointing: false
  attn_window: 16
  rope_max_len: 4096
  char_merge: true
  char_merge_kernel: 3
  char_merge_dropout: 0.0
  memory_size: 16
  memory_comp_dim: 16
  memory_retrieval: true
  memory_sparse_topk: 8
  memory_retrieval_full: false
  memory_forget: true
  ngram_fusion: true
  ngram_corpus: data/pretrain_corpus/smoke_4000.txt
  ngram_max_order: 3
  ngram_min_count: 2
  mixer: hybrid
  linear_attn_feature: relu
  linear_attn_head_dim: 16
  learn_window: true
  layer_skip: false
  alibi: true
  complexity_reward: true
  rope_learnable: true
training:
  complexity_lambda: 0.05
  batch_size: 64
  epochs: 1
  optimizer: sgd
  learning_rate: 0.3
  sgd_learning_rate: 0.3
  momentum: 0.9
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 0.0
  lr_schedule: wsd
  wsd_decay_frac: 0.1
  early_stop_patience: 3
  precision: fp32
  grad_accum_steps: 1
  compile: false
  show_progress: true
  enhancement_schedule:
  - qk_norm: true
    attn_temp: true
    residual_gate: true
    hybrid_gate: true
  - qk_norm: false
    attn_temp: false
    residual_gate: false
    hybrid_gate: false
  - qk_norm: true
    attn_temp: true
    residual_gate: false
    hybrid_gate: false
data:
  train_file: data/pretrain_corpus/smoke_4000.txt
  vocab_size: 5000
  max_seq_length: 32
  num_workers: 0
  test_split: 0.1
paths:
  checkpoint_dir: checkpoints_smoke_arch
  log_dir: logs_smoke_arch
device: dml
seed: 42
