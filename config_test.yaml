# Model Configuration
model:
  vocab_size: 12000
  embedding_dim: 512
  num_heads: 8
  num_layers: 6
  hidden_dim: 1024
  max_seq_length: 64
  dropout: 0.1

# Training Configuration
training:
  batch_size: 32
  epochs: 2                 # 冒烟测试：只跑 2 轮验证流程
  learning_rate: 3.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_steps: 5
  early_stop_patience: 3
  label_smoothing: 0.1
  cpu_threads: 4

# Data Configuration
data:
  train_file: "data/pretrain_corpus/merged_sample.txt"
  vocab_size: 12000
  max_seq_length: 64
  num_workers: 0
  prefetch: 2
  test_split: 0.1

# Paths
paths:
  checkpoint_dir: "checkpoints_test"
  log_dir: "logs_test"

# Device
device: "auto"

# Seed for reproducibility
seed: 42
